<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Glamour & Confort</title>
    <!-- Enlace a nuestro futuro archivo de colores y diseño -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- Encabezado de la App -->
    <header class="app-header">
        <h1>Studio Glamour & Confort</h1>
    </header>

    <!-- Menú de Navegación tipo App Web (Switch) -->
    <nav class="app-nav">
        <button class="nav-btn active" onclick="navigateTo('Barbería')">Barbería</button>
        <button class="nav-btn" onclick="navigateTo('Manicure')">Manicurismo</button>
        <button class="nav-btn" onclick="navigateTo('Spa')">Spa & Aparatología</button>
    </nav>

    <!-- Contenedor Principal -->
    <main class="main-content">
        
        <!-- Módulo 1: Barbería -->
        <section id="Barbería" class="page-section active">
            <h2>Servicios de Barbería</h2>
            <p>Cortes clásicos, modernos y cuidado especializado.</p>
            <!-- Aquí el código inyectará las tarjetas de barbería -->
            <div id="grid-Barbería" class="menu-grid"></div>
        </section>

        <!-- Módulo 2: Manicurismo -->
        <section id="Manicure" class="page-section">
            <h2>Diseño y Cuidado de Uñas</h2>
            <p>Esmaltados, gelish y extensiones con acabados profesionales.</p>
            <!-- Aquí el código inyectará las tarjetas de uñas -->
            <div id="grid-Manicure" class="menu-grid"></div>
        </section>

        <!-- Módulo 3: Spa & Aparatología -->
        <section id="Spa" class="page-section">
            <h2>Spa y Tratamientos</h2>
            <p>Tratamientos de última generación para tu bienestar.</p>
            <!-- Aquí el código inyectará las tarjetas de spa -->
            <div id="grid-Spa" class="menu-grid"></div>
        </section>

    </main>

    <!-- Enlace a nuestro futuro archivo de lógica y base de datos -->
    <script src="js/router.js"></script>
</body>
</html>
